<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0C3328">
  <meta name="description" content="EstudeVet by ZeloVet — plataforma de estudos para Medicina Veterinária">
  <title>EstudeVet · by ZeloVet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script type="module" src="/src/main.js"></script>
</head>
<body>
  <!-- Boot loader -->
  <div id="boot-loader" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#0C3328;color:#8FB3A6;font-family:'Plus Jakarta Sans',sans-serif">
    <div style="width:48px;height:48px;border:3px solid rgba(255,255,255,.12);border-top-color:#C99D66;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px"></div>
    <div style="font-size:14px">Carregando EstudeVet<span style="color:#C99D66">...</span></div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>

  <!-- Ícones SVG reutilizáveis -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <symbol id="i-home" viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><path d="M10 21v-6h4v6"/></symbol>
    <symbol id="i-file" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6M9 17h6"/></symbol>
    <symbol id="i-layers" viewBox="0 0 24 24"><path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></symbol>
    <symbol id="i-book" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></symbol>
    <symbol id="i-landmark" viewBox="0 0 24 24"><path d="M3 22h18"/><path d="M5 18v-7M9.5 18v-7M14.5 18v-7M19 18v-7"/><path d="M12 2 3 8h18z"/></symbol>
    <symbol id="i-target" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></symbol>
    <symbol id="i-trend" viewBox="0 0 24 24"><path d="M3 17l6-6 4 4 8-8"/><path d="M15 7h6v6"/></symbol>
    <symbol id="i-trophy" viewBox="0 0 24 24"><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v6a5 5 0 0 1-10 0z"/><path d="M7 6H4a1 1 0 0 0-1 1 4 4 0 0 0 4 4"/><path d="M17 6h3a1 1 0 0 1 1 1 4 4 0 0 1-4 4"/></symbol>
    <symbol id="i-award" viewBox="0 0 24 24"><circle cx="12" cy="9" r="6"/><path d="M9 14.5 7.5 22l4.5-2.5L16.5 22 15 14.5"/></symbol>
    <symbol id="i-user" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.5-6.5 8-6.5s8 2.5 8 6.5"/></symbol>
    <symbol id="i-settings" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.51 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.26.6.85 1 1.51 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1z"/></symbol>
  </svg>

  <!-- Topbar (sobre o conteúdo) -->
  <header id="topbar" style="display:none">
    <div class="tb-streak" id="tb-streak">🔥 0 dias</div>
    <div class="tb-right">
      <button class="tb-chip" data-goto="analise"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><use href="#i-target"/></svg> Análise</button>
      <button class="tb-chip accent" data-goto="estudo-screen">▶ Novo simulado</button>
      <div class="tb-avatar" id="tb-avatar" data-goto="perfil">?</div>
    </div>
  </header>

  <!-- Sidebar -->
  <nav id="sidebar" style="display:none">
    <div class="sb-brand">
      <div class="sb-mark">
        <!-- Selo branco com o Z da marca (troque pelo símbolo oficial zelovet-symbol.png quando quiser) -->
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 5h14L5 19h14" stroke="#0C3328" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="19" cy="5" r="2.2" fill="#C99D66"/></svg>
      </div>
      <div>
        <div class="sb-brand-name">Estude<span>Vet</span></div>
        <div class="sb-brand-by">by ZeloVet</div>
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Principal</div>
      <button class="nav-item active" data-nav="home"><span class="nav-icon"><svg><use href="#i-home"/></svg></span>Dashboard</button>
      <button class="nav-item" data-nav="flashcards"><span class="nav-icon"><svg><use href="#i-layers"/></svg></span>Flashcards</button>
      <button class="nav-item" data-nav="estudo-screen"><span class="nav-icon"><svg><use href="#i-book"/></svg></span>Estudar</button>
      <button class="nav-item" data-nav="concursos"><span class="nav-icon"><svg><use href="#i-landmark"/></svg></span>Concursos<span class="nav-badge">NOVO</span></button>
    </div>
    <div class="sb-section">
      <div class="sb-label">Progresso</div>
      <button class="nav-item" data-nav="analise"><span class="nav-icon"><svg><use href="#i-target"/></svg></span>Análise de Erros</button>
      <button class="nav-item" data-nav="evolucao"><span class="nav-icon"><svg><use href="#i-trend"/></svg></span>Evolução</button>
      <button class="nav-item" data-nav="ranking"><span class="nav-icon"><svg><use href="#i-trophy"/></svg></span>Ranking</button>
      <button class="nav-item" data-nav="conquistas"><span class="nav-icon"><svg><use href="#i-award"/></svg></span>Conquistas</button>
    </div>
    <div class="sb-section">
      <div class="sb-label">Configurações</div>
      <button class="nav-item" data-nav="perfil"><span class="nav-icon"><svg><use href="#i-user"/></svg></span>Perfil</button>
      <button class="nav-item" data-nav="adm" id="sidebar-admin-btn" style="display:none"><span class="nav-icon"><svg><use href="#i-settings"/></svg></span>Admin<span class="nav-badge" style="margin-left:auto">🔒</span></button>
    </div>
    <div class="sb-footer">
      <div class="sb-user-dot"></div>
      <div><div class="sb-user-name" id="sb-nome">—</div><div class="sb-user-role" id="sb-role">—</div></div>
    </div>
  </nav>

  <!-- Main content area -->
  <main id="main" style="margin-left:0;padding-top:0">
    <div id="app"></div>
  </main>

  <!-- Mobile nav -->
  <nav id="mobile-nav" style="display:none">
    <button class="mn-btn active" data-nav="home"><svg><use href="#i-home"/></svg>Home</button>
    <button class="mn-btn" data-nav="estudo-screen"><svg><use href="#i-book"/></svg>Estudar</button>
    <button class="mn-btn" data-nav="flashcards"><svg><use href="#i-layers"/></svg>Flash</button>
    <button class="mn-btn" data-nav="analise"><svg><use href="#i-target"/></svg>Análise</button>
    <button class="mn-btn" data-nav="perfil"><svg><use href="#i-user"/></svg>Perfil</button>
  </nav>
</body>
</html>
